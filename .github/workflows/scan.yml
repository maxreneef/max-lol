name: Scan High Elo (5 servidores)

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos
  workflow_dispatch:         # permite rodar manualmente

jobs:
  br1:
    runs-on: ubuntu-latest
    steps:
      - name: Scan BR1
        run: |
          for i in $(seq 1 5); do
            echo "[$(date +%H:%M:%S)] BR1 — scan $i/5"
            curl -s -m 60 "https://max-lol.vercel.app/api/cron/scan?region=br1"
            echo ""
            sleep 10
          done

  na1:
